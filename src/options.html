<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>扩展设置</title>
    <style>
      * {
        box-sizing: border-box;
        border-radius: 0;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #f5f5f3;
        color: #111111;
        font: 14px/1.5 "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .page {
        max-width: 640px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      .page__header {
        margin-bottom: 24px;
      }

      .page__title {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
      }

      .page__desc {
        margin: 8px 0 0;
        color: #666666;
      }

      .panel {
        border: 1px solid #d9d9d4;
        background: #ffffff;
        padding: 24px;
      }

      .panel + .panel {
        margin-top: 18px;
      }

      .panel__title {
        margin: 0 0 18px;
        font-size: 16px;
        font-weight: 600;
      }

      .field {
        display: block;
      }

      .field + .field {
        margin-top: 18px;
      }

      .field__label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 600;
      }

      .field__input {
        width: 100%;
        height: 44px;
        padding: 0 12px;
        border: 1px solid #bdbdb7;
        background: #fafaf8;
        color: #111111;
        font: 14px/1.5 ui-monospace, "Cascadia Code", Consolas, monospace;
        outline: none;
      }

      .field__input:focus {
        border-color: #111111;
        background: #ffffff;
      }

      .field__input::placeholder {
        color: #8a8a84;
      }

      .field__textarea {
        min-height: 112px;
        padding: 10px 12px;
        resize: vertical;
      }

      .field__hint {
        margin: 12px 0 0;
        color: #666666;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }

      .button {
        min-width: 96px;
        height: 40px;
        padding: 0 16px;
        border: 1px solid #bdbdb7;
        background: transparent;
        color: #111111;
        font: inherit;
        cursor: pointer;
      }

      .button:hover {
        background: #f3f3f0;
      }

      .button--primary {
        border-color: #111111;
        background: #111111;
        color: #ffffff;
      }

      .button--primary:hover {
        background: #222222;
      }

      .status {
        min-height: 20px;
        margin: 12px 0 0;
        padding-left: 10px;
        border-left: 2px solid transparent;
        font-size: 13px;
      }

      .status[data-state="success"] {
        border-left-color: #1f6b45;
        color: #1f6b45;
      }

      .status[data-state="error"] {
        border-left-color: #a33a2b;
        color: #a33a2b;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <h1 class="page__title">扩展设置</h1>
        <p class="page__desc">配置页面桥接鉴权与浏览器启动后的自动打开网页。</p>
      </header>

      <section id="token-panel" class="panel">
        <h2 class="panel__title">Token</h2>

        <label class="field" for="token-input">
          <span class="field__label">Access Token</span>
          <input id="token-input" class="field__input" type="text" spellcheck="false" autocomplete="off" placeholder="请输入 token">
        </label>

        <p class="field__hint">Token 默认自动生成 32 位字符串，用于页面桥接鉴权。</p>

        <div class="actions">
          <button id="save-token-button" class="button button--primary" type="button">保存 Token</button>
          <button id="regen-button" class="button" type="button">重新生成</button>
        </div>

        <p id="token-status" class="status" aria-live="polite"></p>
      </section>

      <section id="startup-url-panel" class="panel">
        <h2 class="panel__title">启动打开 URL</h2>

        <label class="field" for="startup-url-input">
          <span class="field__label">启动打开 URL</span>
          <textarea id="startup-url-input" class="field__input field__textarea" spellcheck="false" autocomplete="off" placeholder="https://example.com&#10;https://example.org"></textarea>
        </label>

        <p class="field__hint">URL 可为空；每行一个 URL，非空行必须包含 http:// 或 https://。</p>

        <div class="actions">
          <button id="save-startup-url-button" class="button button--primary" type="button">保存启动 URL</button>
        </div>

        <p id="startup-url-status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
